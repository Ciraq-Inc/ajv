<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f8fafc"/>

  <!-- Soft circle backdrop -->
  <circle cx="100" cy="97" r="54" fill="#f1f5f9"/>

  <!-- Pill drop shadow -->
  <g transform="translate(103,101) rotate(-35)">
    <rect x="-39" y="-14" width="78" height="28" rx="14" fill="#94a3b8" opacity="0.18"/>
  </g>

  <!-- Two-tone capsule pill -->
  <g transform="translate(100,97) rotate(-35)">
    <!-- Left half: indigo -->
    <rect x="-39" y="-14" width="78" height="28" rx="14" fill="#a5b4fc"/>
    <!-- Right cap: lighter lavender -->
    <path d="M0,-14 L25,-14 A14,14 0 0,1 39,0 A14,14 0 0,1 25,14 L0,14 Z" fill="#e0e7ff"/>
    <!-- Outer ring -->
    <rect x="-39" y="-14" width="78" height="28" rx="14" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.35"/>
    <!-- Centre divider -->
    <line x1="0" y1="-14" x2="0" y2="14" stroke="white" stroke-width="2" opacity="0.65"/>
    <!-- Shine highlight on left half -->
    <ellipse cx="-16" cy="-5" rx="10" ry="4.5" fill="white" opacity="0.22" transform="rotate(5,-16,-5)"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="40" cy="40" r="6" fill="#e0e7ff"/>
  <circle cx="160" cy="40" r="9" fill="#ede9fe" opacity="0.75"/>
  <circle cx="40" cy="160" r="9" fill="#ede9fe" opacity="0.75"/>
  <circle cx="160" cy="160" r="6" fill="#e0e7ff"/>
</svg>
